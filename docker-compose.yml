services:
  api:
    build: ./api
    ports:
      - "3000:3000"
    volumes:
      - logs_volume:/app/logs # shared volume where logs are written
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  analyzer:
    build: ./analyzer
    volumes:
      - logs_volume:/app/logs # same shared volume, it reads what the api writes
    depends_on:
      - api

  db:
    image: postgres:17-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - db_volume:/var/lib/postgresql/data # data persists between container restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - api
  
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - grafana_volume:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

volumes:
  logs_volume:
  db_volume:
  grafana_volume: